name: Build Zed Windows

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write   # 👈 Needed for creating releases
    env:
      CARGO_TERM_COLOR: always

    steps:
      # --- Step 1: Checkout repo ---
      - name: Checkout repository
        uses: actions/checkout@v3

      # --- Step 2: Install Rust ---
      - name: Install Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          target: x86_64-pc-windows-msvc
          profile: minimal
          override: true
        
      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      # --- Step 3: Detect Visual Studio / Build Tools ---
      - name: Setup MSVC environment
        shell: pwsh
        run: |
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"

          if (!(Test-Path $vswhere)) {
              throw "vswhere not found"
          }

          $vsPath = & $vswhere -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath

          if (!$vsPath) {
              throw "Visual Studio with C++ tools not found"
          }

          Write-Host "VS Path: $vsPath"

          $vcvars = Join-Path $vsPath "VC\Auxiliary\Build\vcvars64.bat"

          if (!(Test-Path $vcvars)) {
              throw "vcvars64.bat not found"
          }

          cmd /c "`"$vcvars`" && set" | ForEach-Object {
              if ($_ -match "^(.*?)=(.*)$") {
                  echo "$($_)" >> $env:GITHUB_ENV
              }
          }

      # --- Step 4: Ensure CMake is installed ---
      - name: Install CMake
        uses: jwlawson/actions-setup-cmake@v1
        with:
          version: '3.27.0' # adjust as needed

      # --- Step 5: Enable long paths ---
      - name: Enable long path support
        shell: pwsh
        run: |
          git config --system core.longpaths true
          New-ItemProperty -Path "HKLM:\SYSTEM\CurrentControlSet\Control\FileSystem" -Name "LongPathsEnabled" -Value 1 -PropertyType DWORD -Force

      # --- Step 6: Create Cargo config.toml ---
      - name: Create Cargo config for Windows build
        run: |
          mkdir -Force .cargo
          echo "[build]" > .cargo/config.toml
          echo 'rustflags = ["-C", "symbol-mangling-version=v0", "--cfg", "tokio_unstable"]' >> .cargo/config.toml
          echo '[target."cfg(target_os = \"windows\")"]' >> .cargo/config.toml
          echo 'rustflags = ["--cfg", "windows_slim_errors", "-C", "target-feature=+crt-static"]' >> .cargo/config.toml

      # --- Step 7: Debug build ---
      - name: Cargo debug build
        run: cargo build

      # --- Step 8: Release build ---
      - name: Cargo release build
        run: cargo build --release
        #run: cargo run --release (chatgpt say>CI should not run binaries unless needed.)

      # --- Step 9: Run workspace tests -(DONOT ENABLE THIS.MAY TAKE HOURS!LOWIQ)
      #- name: Run tests
      #  run: cargo test --workspace --release
        # run: cargo test --workspace # ori zed slow test

      - name: Upload Debug Binaries
        uses: actions/upload-artifact@v4
        with:
          name: Vibe_debug-binaries-win
          path: target/debug/zed*


      - name: Upload release binaries
        uses: actions/upload-artifact@v4
        with:
          name: Vibe_rel-binaries-win
          path: target/release/zed*   # works cross-platform

      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}#auto no need create
        with:
          tag_name: v1.0.0
          release_name: Release ${{ github.ref_name }}
          files: ./target/release/zed*
          
          
      # --- Optional: PostgreSQL setup notes ---
      - name: PostgreSQL notes
        run: |
          Write-Host "If using PostgreSQL, ensure pg_hba.conf uses 'trust' for local connections."
          Write-Host "Set lc_messages in postgresql.conf to 'English_United States.1252' if locale is non-Latin."

